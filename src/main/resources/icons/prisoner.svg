<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Body with striped prison uniform -->
  <rect x="18" y="30" width="28" height="24" rx="4" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <!-- Horizontal stripes on uniform -->
  <rect x="18" y="34" width="28" height="4" fill="#2c3e50"/>
  <rect x="18" y="42" width="28" height="4" fill="#2c3e50"/>
  <rect x="18" y="50" width="28" height="4" fill="#2c3e50"/>
  <!-- Arms -->
  <rect x="12" y="32" width="8" height="18" rx="4" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <rect x="44" y="32" width="8" height="18" rx="4" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <rect x="12" y="36" width="8" height="4" fill="#2c3e50"/>
  <rect x="12" y="44" width="8" height="4" fill="#2c3e50"/>
  <rect x="44" y="36" width="8" height="4" fill="#2c3e50"/>
  <rect x="44" y="44" width="8" height="4" fill="#2c3e50"/>
  <!-- Hands -->
  <circle cx="16" cy="52" r="3" fill="#e8b88a"/>
  <circle cx="48" cy="52" r="3" fill="#e8b88a"/>
  <!-- Head -->
  <circle cx="32" cy="18" r="12" fill="#e8b88a" stroke="#333" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="28" cy="16" r="2" fill="#333"/>
  <circle cx="36" cy="16" r="2" fill="#333"/>
  <!-- Eyebrows (worried look) -->
  <path d="M26 13 L30 14" stroke="#333" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M34 14 L38 13" stroke="#333" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Mouth -->
  <path d="M29 22 Q32 24 35 22" stroke="#333" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Prisoner cap -->
  <path d="M20 12 Q20 6 32 6 Q44 6 44 12 L44 14 Q44 10 32 10 Q20 10 20 14 Z" fill="#2c3e50"/>
  <!-- Legs -->
  <rect x="22" y="54" width="8" height="8" rx="2" fill="#2c3e50" stroke="#333" stroke-width="1"/>
  <rect x="34" y="54" width="8" height="8" rx="2" fill="#2c3e50" stroke="#333" stroke-width="1"/>
  <!-- Shoes -->
  <rect x="21" y="60" width="10" height="4" rx="2" fill="#4a4a4a"/>
  <rect x="33" y="60" width="10" height="4" rx="2" fill="#4a4a4a"/>
</svg>
